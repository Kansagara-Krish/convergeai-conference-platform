<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat - Conference Chatbot System</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/user.css?v=3">
    <link rel="stylesheet" href="../css/chat.css">
    <script src="../js/utils.js?v=2"></script>
    <script src="../js/main.js?v=4"></script>
</head>
<body>
    <!-- overlay used to show guest or background images full-screen -->
    <div id="chat-overlay" class="chat-overlay" aria-hidden="true">
        <div class="chat-overlay-content" id="chat-overlay-content">
            <div class="chat-overlay-chip" id="chat-overlay-title">Guest Preview</div>
            <div class="chat-overlay-frame">
                <img id="chat-overlay-image" class="chat-overlay-image" alt="Preview image" />
            </div>
        </div>
    </div>
    <div class="user-container">
        <!-- Header -->
        <header class="user-header">
            <div class="user-header-content">
                <div class="user-logo">
                    <div class="chat-top-logo"><span class="material-symbols-outlined">smart_toy</span></div>
                    <span id="chatbot-top-title">ConvergeAI Chat</span>
                </div>

                <nav class="user-nav">
                    <div class="header-user-menu">
                        <button class="header-user-btn">
                            <span class="chat-top-user-avatar" data-user-avatar>U</span>
                        </button>
                        <div class="dropdown-menu chat-header-dropdown">
                            <a href="profile.html" class="dropdown-item"><i class="fas fa-user"></i> Profile</a>
                            <a href="#" class="dropdown-item" data-action="logout"><i class="fas fa-sign-out-alt"></i> Logout</a>
                        </div>
                    </div>
                </nav>
            </div>
        </header>

        <div class="chat-main">
            <div class="chat-wrapper">
                <aside class="chat-guest-wall" id="chat-guest-wall" aria-label="Event guests">
                    <div class="chat-guest-wall-title">Guests</div>
                    <div class="chat-guest-wall-list" id="chat-guest-wall-list">
                        <div class="chat-guest-wall-empty">Loading guests...</div>
                    </div>
                </aside>

                <!-- Messages Area -->
                <div class="messages-area">
                    <div class="message-group assistant">
                        <div class="message-bubble">
                            <div class="message-text">Loading chat history...</div>
                            <div class="message-time">--:--</div>
                        </div>
                    </div>
                </div>

                <!-- Input Area -->
                <div class="input-area">
                    <div class="chat-composer">
                        <button class="input-action-btn input-plus-btn" id="chat-attach-btn" title="Upload image">
                            <span class="material-symbols-outlined">add</span>
                        </button>

                        <div class="input-wrapper">
                            <div class="file-preview" id="chat-file-preview"></div>
                            <textarea class="input-field" placeholder="Message ConvergeAI..." rows="1"></textarea>
                        </div>

                        <div class="composer-right-actions">
                            <button class="input-action-btn mic-btn" id="chat-mic-btn" title="Voice input">
                                <span class="material-symbols-outlined">mic</span>
                            </button>
                            <button class="send-btn" title="Send message">
                                <span class="material-symbols-outlined">arrow_upward</span>
                            </button>
                        </div>

                        <input type="file" id="chat-image-input" class="chat-hidden-file-input" accept="image/png,image/jpeg,image/jpg,image/webp,image/gif" aria-label="Upload image">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <style>
        .user-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .chat-main {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr;
        }

        .user-main {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr;
        }
    </style>
</body>
</html>
