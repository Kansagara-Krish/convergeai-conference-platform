<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat - Conference Chatbot System</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/user.css?v=3">
    <link rel="stylesheet" href="../css/chat.css">
    <script src="../js/utils.js?v=2"></script>
    <script src="../js/main.js?v=4"></script>
</head>
<body>
    <!-- overlay used to show guest or background images full-screen -->
    <div id="chat-overlay" class="chat-overlay"></div>
    <div class="user-container">
        <!-- Header -->
        <header class="user-header">
            <div class="user-header-content">
                <div class="user-logo">
                    <div style="width: 40px; height: 40px; background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan)); border-radius: var(--radius-md); display: flex; align-items: center; justify-content: center; font-size: 1.5rem;"><span class="material-symbols-outlined" style="font-size: 1.5rem; color: #fff;">smart_toy</span></div>
                    <span>ConvergeAI Chat</span>
                </div>

                <nav class="user-nav">
                    <div class="header-user-menu">
                        <button class="header-user-btn">
                            <span style="width: 32px; height: 32px; border-radius: 50%; background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple)); display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; font-size: 0.9rem;" data-user-avatar>U</span>
                        </button>
                        <div class="dropdown-menu chat-header-dropdown">
                            <a href="profile.html" class="dropdown-item"><i class="fas fa-user"></i> Profile</a>
                            <a href="#" class="dropdown-item" data-action="logout"><i class="fas fa-sign-out-alt"></i> Logout</a>
                        </div>
                    </div>
                </nav>
            </div>
        </header>

        <div style="flex: 1; display: grid; grid-template-columns: 1fr;">
            <div class="chat-wrapper">
                <aside class="chat-guest-wall" id="chat-guest-wall" aria-label="Event guests">
                    <div class="chat-guest-wall-title">Guests</div>
                    <div class="chat-guest-wall-list" id="chat-guest-wall-list">
                        <div class="chat-guest-wall-empty">Loading guests...</div>
                    </div>
                </aside>

                <!-- Chat Header -->
                <div class="chat-header-bar">
                    <div class="chat-header-actions">
                    </div>
                </div>

                <!-- Messages Area -->
                <div class="messages-area">
                    <div class="message-group">
                        <div class="message-avatar bot"><span class="material-symbols-outlined">smart_toy</span></div>
                        <div class="message-bubble">
                            <div class="message-text">Loading chat history...</div>
                            <div class="message-time">--:--</div>
                        </div>
                    </div>
                </div>

                <!-- Input Area -->
                <div class="input-area">
                    <div class="file-preview" id="chat-file-preview" style="display: none;"></div>
                    <div class="input-wrapper">
                        <input type="text" class="input-field" placeholder="Type your message...">
                        <input type="file" id="chat-image-input" accept="image/png,image/jpeg,image/jpg,image/webp,image/gif" style="display: none;">
                    </div>
                    <div class="input-actions">
                        <button class="input-action-btn" id="chat-attach-btn" title="Attach image"><span class="material-symbols-outlined">attach_file</span></button>
                        <button class="input-action-btn" title="Emoji"><span class="material-symbols-outlined">sentiment_satisfied</span></button>
                        <button class="send-btn"><span class="material-symbols-outlined">send</span></button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <style>
        .user-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .user-main {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr;
        }
    </style>
</body>
</html>
