<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat - Conference Chatbot System</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/user.css?v=3">
    <link rel="stylesheet" href="../css/chat.css?v=13">
    <script src="../js/utils.js?v=3"></script>
    <script src="../js/main.js?v=13"></script>
</head>
<body>
    <div class="user-container">
        <!-- Header -->
        <header class="user-header">
            <div class="user-header-content">
                <div class="user-logo">
                    <div class="chat-top-logo"><span class="material-symbols-outlined">smart_toy</span></div>
                    <span id="chatbot-top-title">ConvergeAI Chat</span>
                </div>

                <nav class="user-nav">
                    <div class="header-user-menu">
                        <button class="header-user-btn">
                            <span class="chat-top-user-avatar" data-user-avatar>U</span>
                            <span class="material-symbols-outlined chat-user-chevron" aria-hidden="true">expand_more</span>
                        </button>
                        <div class="dropdown-menu chat-header-dropdown">
                            <a href="profile.html" class="dropdown-item"><i class="fas fa-user"></i> Profile</a>
                            <a href="#" class="dropdown-item" data-action="logout"><i class="fas fa-sign-out-alt"></i> Logout</a>
                        </div>
                    </div>
                </nav>
            </div>
        </header>

        <div class="chat-main">
            <aside class="chat-conversations" id="chat-conversations" aria-label="Conversations">
                <div class="chat-conversations-header">
                    <span class="chat-conversations-title">Conversations</span>
                    <button type="button" id="new-chat-btn" title="New Chat" class="new-chat-btn" aria-label="Create new conversation">
                        <span class="material-symbols-outlined">add</span>
                    </button>
                </div>
                <div class="chat-conversations-list" id="chat-conversations-list">
                    <!-- Skeleton loaders for conversations -->
                    <div class="skeleton-conversation"></div>
                    <div class="skeleton-conversation"></div>
                    <div class="skeleton-conversation"></div>
                    <div class="skeleton-conversation"></div>
                    <div class="skeleton-conversation"></div>
                    
                    <div class="chat-conversations-empty">No conversations yet. Start a new chat!</div>
                </div>
            </aside>

            <div class="chat-wrapper">

                <!-- Messages Area -->
                <div class="messages-area">
                    <!-- Skeleton loaders for messages -->
                    <div class="skeleton-message assistant">
                        <div class="skeleton-message-bubble"></div>
                    </div>
                    <div class="skeleton-message user">
                        <div class="skeleton-message-bubble"></div>
                    </div>
                    <div class="skeleton-message assistant">
                        <div class="skeleton-message-bubble"></div>
                    </div>
                    
                    <div class="message-group assistant">
                        <div class="message-bubble">
                            <div class="message-text">Loading chat history...</div>
                            <div class="message-time">--:--</div>
                        </div>
                    </div>
                </div>

                <!-- Input Area -->
                <div class="input-area">
                    <div class="chat-composer">
                        <div class="attach-wrap">
                          <button class="input-action-btn input-plus-btn" id="chat-attach-btn" aria-haspopup="true" aria-expanded="false" title="Attachments">
                              <span class="material-symbols-outlined">add</span>
                          </button>

                          <div class="attach-menu" id="chat-attach-menu" aria-hidden="true">
                              <button type="button" class="attach-option" id="chat-attach-upload">
                                  <span class="material-symbols-outlined">attach_file</span>
                                  <span class="attach-text">Upload image</span>
                              </button>
                              <button type="button" class="attach-option" id="chat-attach-camera">
                                  <span class="material-symbols-outlined">photo_camera</span>
                                  <span class="attach-text">Take photo</span>
                              </button>
                          </div>
                        </div>

                        <div class="input-wrapper">
                            <div class="file-preview" id="chat-file-preview"></div>
                            <textarea class="input-field" placeholder="Message ConvergeAI..." rows="1"></textarea>
                        </div>

                        <div class="composer-right-actions">
                            <!-- mic removed per design -->
                            <button class="send-btn" title="Send message">
                                <span class="material-symbols-outlined">arrow_upward</span>
                            </button>
                        </div>

                        <input type="file" id="chat-image-input" class="chat-hidden-file-input" accept="image/png,image/jpeg,image/jpg,image/webp,image/gif" aria-label="Upload image">
                    </div>
                    <p class="chat-input-info">Image responses may take a few seconds to generate.</p>
                </div>
            </div>
        </div>
    </div>

    <!-- camera modal for capturing photos -->
    <div class="camera-modal" id="chat-camera-modal" aria-hidden="true">
        <div class="camera-modal-content">
            <div class="camera-modal-instructions">Please make sure you're photographing a person before capturing.</div>
            <video id="chat-camera-video" autoplay playsinline></video>
            <canvas id="chat-camera-canvas" style="display:none;"></canvas>
            <div class="camera-actions">
                <button type="button" id="chat-camera-capture" class="btn btn-primary btn-sm">Capture</button>
                <button type="button" id="chat-camera-close" class="btn btn-secondary btn-sm">Cancel</button>
            </div>
        </div>
    </div>

    <style>
        .user-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .chat-main {
            flex: 1;
            display: grid;
            grid-template-columns: 260px 1fr;
            gap: 0;
            min-height: 0;
            margin-top: 56px;
        }

        .chat-wrapper {
            display: grid;
            grid-template-rows: 1fr auto;
            gap: 0;
            min-height: 0;
        }

        .input-area {
            flex-shrink: 0;
        }

        .user-main {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr;
        }
    </style>
</body>
</html>
